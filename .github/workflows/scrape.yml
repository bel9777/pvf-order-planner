name: Daily inventory scrape

on:
  schedule:
    - cron: "17 10 * * *"   # daily ~6:17 AM Eastern
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests beautifulsoup4
      - run: python scraper/scrape.py
      - name: Commit if inventory changed
        run: |
          git config user.name "pvf-scraper-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/inventory.json
          git diff --cached --quiet || git commit -m "Daily inventory scrape"
          git push
